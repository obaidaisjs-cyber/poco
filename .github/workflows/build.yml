name: Build Redwood Kernel with KernelSU-Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev clang lld gcc-aarch64-linux-gnu device-tree-compiler python3

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 -b redwood-s-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel
          git clone --depth 1 -b redwood-s-oss https://github.com/MiCode/kernel_devicetree.git kernel/devicetree
          git clone --depth 1 -b redwood-s-oss https://github.com/MiCode/vendor_qcom_opensource_wlan.git kernel/wlan
          git clone --depth 1 -b redwood-s-oss https://github.com/MiCode/kernel_build.git kernel/build

      - name: Integrate KernelSU-Next (legacy)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Merge Config Fragment
        run: |
          cd kernel
          export ARCH=arm64
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/redwood_QGKI.config
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/vendor/redwood_QGKI.config
          echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/vendor/redwood_QGKI.config
          echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/vendor/redwood_QGKI.config
          scripts/kconfig/merge_config.sh -m arch/arm64/configs/gki_defconfig arch/arm64/configs/vendor/redwood_QGKI.config
          mv .config arch/arm64/configs/redwood_merged_defconfig

      - name: Disable entire CORESIGHT subsystem
        run: |
          cd kernel
          sed -i '/CONFIG_CORESIGHT/d' arch/arm64/configs/redwood_merged_defconfig
          echo "# CORESIGHT disabled entirely" >> arch/arm64/configs/redwood_merged_defconfig

      - name: Disable forbidden-warning wrapper
        run: |
          cd kernel
          for f in $(find . -iname "gcc-wrapper.py"); do
            printf '#!/usr/bin/env python3\nimport sys, subprocess\nsys.exit(subprocess.call(sys.argv[1:]))\n' > "$f"
            chmod +x "$f"
            echo "Patched: $f"
          done

      - name: Attempt Build
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- redwood_merged_defconfig || echo "DEFCONFIG_FAILED"
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" -j$(nproc) 2>&1 | tee build_log.txt || echo "BUILD_FAILED"

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build_log.txt

      - name: Upload Kernel Image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-ksu-next
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore
