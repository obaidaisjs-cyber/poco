name: Build Poco X5 Pro Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo6 libncurses6

    - name: Setup Clang Toolchain
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        # تحميل نسخة Clang مستقرة ومباشرة ومخصصة لكيرنال أندرويد 14
        curl -LO https://googlesource.com
        tar -xf clang-r487747c.tar.gz
        rm clang-r487747c.tar.gz

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com -b 14 kernel

    - name: Build Kernel Binary
      run: |
        cd kernel
        export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        
        make O=out vendor/redwood_user_defconfig
        make -j$(nproc --all) O=out

    - name: Upload Kernel Output
      uses: actions/upload-artifact@v4
      with:
        name: Poco-X5Pro-Kernel
        path: |
          kernel/out/arch/arm64/boot/Image
          kernel/out/arch/arm64/boot/
          Image.gz
